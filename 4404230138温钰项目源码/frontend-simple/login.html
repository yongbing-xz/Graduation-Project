<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>硬件兼容性检测平台 - 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #3b82f6;
      --border: #374151;
    }
    
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: linear-gradient(160deg, #0b1021, #0e162f 50%, #0b1021);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      max-width: 400px;
      width: 90%;
      margin: 20px auto;
      padding: 40px;
    }
    
    .login-card {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-logo h1 {
      font-size: 28px;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #3b82f6; /* Fallback color for browsers that don't support background-clip: text */
      font-weight: 700;
    }
    
    .login-logo p {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
    }
    
    .form-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .form-input::placeholder {
      color: var(--muted);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }
    
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .form-switch {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 14px;
    }
    
    .form-switch a {
      color: #3b82f6;
      text-decoration: none;
      cursor: pointer;
    }
    
    .form-switch a:hover {
      text-decoration: underline;
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    
    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <h1>硬件兼容性检测平台</h1>
        <p>专业的硬件组件兼容性分析工具</p>
      </div>

      <div id="app">
        <!-- 登录表单 -->
        <div v-if="!isRegister">
          <div v-if="message" class="alert" :class="messageClass">{{ message }}</div>
          
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input 
              type="text" 
              class="form-input" 
              placeholder="请输入用户名"
              v-model="loginForm.username"
              @keyup.enter="login"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">密码</label>
            <input 
              type="password" 
              class="form-input" 
              placeholder="请输入密码"
              v-model="loginForm.password"
              @keyup.enter="login"
            >
          </div>
          
          <button class="btn" @click="login" :disabled="isLoading">
            {{ isLoading ? '登录中...' : '登录' }}
          </button>
          
          <div class="form-switch">
            还没有账号？ <a @click="switchToRegister">立即注册</a>
          </div>
        </div>

        <!-- 注册表单 -->
        <div v-else>
          <div v-if="message" class="alert" :class="messageClass">{{ message }}</div>
          
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input 
              type="text" 
              class="form-input" 
              placeholder="请输入用户名"
              v-model="registerForm.username"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">邮箱</label>
            <input 
              type="email" 
              class="form-input" 
              placeholder="请输入邮箱"
              v-model="registerForm.email"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">密码</label>
            <input 
              type="password" 
              class="form-input" 
              placeholder="请输入密码（至少6位）"
              v-model="registerForm.password"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">确认密码</label>
            <input 
              type="password" 
              class="form-input" 
              placeholder="请再次输入密码"
              v-model="registerForm.confirmPassword"
              @keyup.enter="register"
            >
          </div>
          
          <button class="btn" @click="register" :disabled="isLoading">
            {{ isLoading ? '注册中...' : '注册' }}
          </button>
          
          <div class="form-switch">
            已有账号？ <a @click="switchToLogin">立即登录</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          isRegister: false,
          isLoading: false,
          message: '',
          messageClass: '',
          
          loginForm: {
            username: '',
            password: ''
          },
          
          registerForm: {
            username: '',
            email: '',
            password: '',
            confirmPassword: ''
          }
        };
      },
      methods: {
        switchToRegister() {
          this.isRegister = true;
          this.message = '';
          this.resetForms();
        },
        
        switchToLogin() {
          this.isRegister = false;
          this.message = '';
          this.resetForms();
        },
        
        resetForms() {
          this.loginForm = { username: '', password: '' };
          this.registerForm = { 
            username: '', 
            email: '', 
            password: '', 
            confirmPassword: '' 
          };
        },
        
        showMessage(text, type = 'error') {
          this.message = text;
          this.messageClass = type === 'error' ? 'alert-error' : 'alert-success';
          setTimeout(() => {
            this.message = '';
          }, 5000);
        },
        
        validateLogin() {
          if (!this.loginForm.username.trim()) {
            this.showMessage('请输入用户名');
            return false;
          }
          if (!this.loginForm.password) {
            this.showMessage('请输入密码');
            return false;
          }
          return true;
        },
        
        validateRegister() {
          if (!this.registerForm.username.trim()) {
            this.showMessage('请输入用户名');
            return false;
          }
          if (this.registerForm.username.length < 3) {
            this.showMessage('用户名至少3个字符');
            return false;
          }
          if (!this.registerForm.email.trim()) {
            this.showMessage('请输入邮箱');
            return false;
          }
          if (!this.isValidEmail(this.registerForm.email)) {
            this.showMessage('请输入有效的邮箱地址');
            return false;
          }
          if (!this.registerForm.password) {
            this.showMessage('请输入密码');
            return false;
          }
          if (this.registerForm.password.length < 6) {
            this.showMessage('密码至少6位');
            return false;
          }
          if (this.registerForm.password !== this.registerForm.confirmPassword) {
            this.showMessage('两次输入的密码不一致');
            return false;
          }
          return true;
        },
        
        isValidEmail(email) {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          return emailRegex.test(email);
        },
        
        async login() {
          if (!this.validateLogin()) return;
          
          this.isLoading = true;
          
          try {
            // 模拟登录请求
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 检查默认账号
            const isDefaultAccount = 
              this.loginForm.username === 'demo' && 
              this.loginForm.password === '123456';
            
            // 验证用户（这里使用本地存储模拟）
            const users = JSON.parse(localStorage.getItem('hardware_users') || '[]');
            const user = users.find(u => 
              u.username === this.loginForm.username && 
              u.password === this.loginForm.password
            );
            
            if (user || isDefaultAccount) {
              // 保存用户信息到本地存储
              localStorage.setItem('current_user', JSON.stringify({
                username: isDefaultAccount ? 'demo' : user.username,
                email: isDefaultAccount ? 'demo@example.com' : user.email,
                loginTime: new Date().toISOString(),
                isDefaultAccount: isDefaultAccount
              }));
              
              this.showMessage('登录成功！正在跳转...', 'success');
              
              // 跳转到主页面
              setTimeout(() => {
                window.location.href = 'index.html';
              }, 1500);
            } else {
              this.showMessage('用户名或密码错误');
            }
          } catch (error) {
            this.showMessage('登录失败，请重试');
          } finally {
            this.isLoading = false;
          }
        },
        
        async register() {
          if (!this.validateRegister()) return;
          
          this.isLoading = true;
          
          try {
            // 模拟注册请求
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 检查用户是否已存在
            const users = JSON.parse(localStorage.getItem('hardware_users') || '[]');
            const existingUser = users.find(u => 
              u.username === this.registerForm.username || 
              u.email === this.registerForm.email
            );
            
            if (existingUser) {
              this.showMessage('用户名或邮箱已被注册');
              return;
            }
            
            // 添加新用户
            const newUser = {
              username: this.registerForm.username,
              email: this.registerForm.email,
              password: this.registerForm.password,
              registerTime: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('hardware_users', JSON.stringify(users));
            
            this.showMessage('注册成功！请登录', 'success');
            
            // 自动切换到登录界面
            setTimeout(() => {
              this.switchToLogin();
            }, 2000);
            
          } catch (error) {
            this.showMessage('注册失败，请重试');
          } finally {
            this.isLoading = false;
          }
        }
      },
      
      mounted() {
        // 检查是否已经登录
        const currentUser = localStorage.getItem('current_user');
        if (currentUser) {
          window.location.href = 'index.html';
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
